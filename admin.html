        function checkLogin() { if(document.getElementById('pin-input').value === currentData.password_admin) { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('cms-screen').classList.remove('hidden'); buildEditorForm(); } else { document.getElementById('login-error').classList.remove('hidden'); } }

        function buildEditorForm() {
            const area = document.getElementById('dynamic-editor-area'); let html = '';
            html += `<div class="bg-blue-50 p-6 rounded-2xl mb-6"><h3 class="font-bold mb-4">🖼️ Logo & SEO Meta</h3><input type="file" id="edit_logo" accept="image/*" class="w-full mb-4 text-sm bg-white p-2 rounded-xl"><textarea id="edit_meta" class="w-full p-3 border rounded-xl" rows="2">${currentData.meta_description || ''}</textarea></div>`;
            
            currentData.blocks.forEach(b => {
                html += `<div class="bg-slate-50 p-6 rounded-2xl border-2 border-slate-200" id="${b.id}"><div class="text-xs font-bold text-white bg-slate-800 inline-block px-3 py-1 rounded-full mb-4">${b.type}</div>`;
                if (b.type === 'hero') {
                    html += `<input type="text" class="w-full p-3 border rounded-xl mb-3 sec-inp" data-key="headline" value="${b.headline||''}">
                             <textarea class="w-full p-3 border rounded-xl mb-4 sec-inp" data-key="subheadline" rows="2">${b.subheadline||''}</textarea>
                             <div class="grid md:grid-cols-2 gap-4">
                                <div class="bg-white p-3 rounded-lg border"><label class="block text-sm font-semibold mb-2">Gambar Samping (Opsional):</label><input type="file" class="w-full text-sm sec-img"></div>
                                <div class="bg-white p-3 rounded-lg border"><label class="block text-sm font-semibold mb-2">Background Image (Opsional):</label><input type="file" class="w-full text-sm sec-bg-img"></div>
                             </div>`;
                } else if (b.type === 'text_image') {
                    html += `<input type="text" class="w-full p-3 border rounded-xl mb-3 sec-inp" data-key="title" value="${b.title||''}">
                             <textarea class="w-full p-3 border rounded-xl mb-4 sec-inp" data-key="content" rows="4">${b.content||''}</textarea>
                             <label class="block text-sm font-semibold mb-2">Ganti Gambar (Opsional):</label><input type="file" class="w-full text-sm sec-img bg-white p-2 rounded-lg">`;
                } else if (b.type === 'catalog') {
                    html += `<input type="text" class="w-full p-3 border rounded-xl mb-4 sec-inp" data-key="title" value="${b.title || ''}">`;
                    if(b.catalog_items) {
                        b.catalog_items.forEach((item, idx) => {
                            html += `<div class="bg-white p-4 border rounded-xl mb-4 catalog-item-edit">
                                <div class="grid grid-cols-2 gap-3 mb-3"><input type="text" class="w-full p-2 border rounded cat-name" value="${esc(item.name)}"><input type="text" class="w-full p-2 border rounded cat-price" value="${esc(item.price)}"></div>
                                <textarea class="w-full p-2 border rounded mb-3 cat-desc" rows="2">${esc(item.desc)}</textarea>
                                <label class="block text-xs font-semibold mb-1">Ganti Gambar Produk (Opsional):</label><input type="file" class="w-full text-sm cat-img border rounded mb-3">
                                <input type="text" class="w-full p-2 border rounded cat-url" value="${esc(item.btn_url)}" placeholder="Custom URL Khusus Produk Ini (Jika Ada)">
                            </div>`;
                        });
                    }
                } else if (b.type === 'features') {
                    html += `<input type="text" class="w-full p-3 border rounded-xl mb-3 sec-inp" data-key="title" value="${b.title || ''}"><textarea class="w-full p-3 border rounded-xl sec-inp" data-key="items" rows="4">${b.items || ''}</textarea>`;
                } else if (b.type === 'contact') {
                    html += `<input type="text" class="w-full p-3 border rounded-xl mb-3 sec-inp" data-key="title" value="${b.title || ''}"><input type="number" class="w-full p-3 border rounded-xl sec-inp" data-key="wa" value="${b.wa || ''}">`;
                }
                html += `</div>`;
            });
            area.innerHTML = html;
        }

        const toBase64 = f => new Promise((r, j) => { if(!f) return r(null); const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); rd.onerror = e => j(e); });

        document.getElementById('cms-form').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('btn-save'); btn.innerText = "⏳ Sedang Menyimpan..."; btn.disabled = true;
            try {
                let payload = JSON.parse(JSON.stringify(currentData)); 
                payload.meta_description = document.getElementById('edit_meta').value;
                const newLogo = document.getElementById('edit_logo').files[0];
                if(newLogo) { payload.logo_base64 = await toBase64(newLogo); payload.logo_ext = newLogo.name.split('.').pop(); }

                for(let i=0; i < payload.blocks.length; i++) {
                    const blockDiv = document.getElementById(payload.blocks[i].id);
                    if(blockDiv) {
                        if(payload.blocks[i].type === 'catalog' && payload.blocks[i].catalog_items) {
                            const catEdits = blockDiv.querySelectorAll('.catalog-item-edit');
                            for(let j=0; j < catEdits.length; j++) {
                                let itemData = payload.blocks[i].catalog_items[j];
                                itemData.name = catEdits[j].querySelector('.cat-name').value;
                                itemData.price = catEdits[j].querySelector('.cat-price').value;
                                itemData.desc = catEdits[j].querySelector('.cat-desc').value;
                                itemData.btn_url = catEdits[j].querySelector('.cat-url').value;
                                const imgInp = catEdits[j].querySelector('.cat-img');
                                if (imgInp && imgInp.files[0]) { itemData.image_base64 = await toBase64(imgInp.files[0]); itemData.image_ext = imgInp.files[0].name.split('.').pop(); } else { delete itemData.image_base64; }
                            }
                        } else {
                            blockDiv.querySelectorAll('.sec-inp').forEach(inp => payload.blocks[i][inp.dataset.key] = inp.value);
                            
                            const imgInput = blockDiv.querySelector('.sec-img');
                            if(imgInput && imgInput.files[0]) { payload.blocks[i].image_base64 = await toBase64(imgInput.files[0]); payload.blocks[i].image_ext = imgInput.files[0].name.split('.').pop(); } else { delete payload.blocks[i].image_base64; }
                            
                            const bgInput = blockDiv.querySelector('.sec-bg-img');
                            if(bgInput && bgInput.files[0]) { payload.blocks[i].bg_image_base64 = await toBase64(bgInput.files[0]); payload.blocks[i].bg_image_ext = bgInput.files[0].name.split('.').pop(); } else { delete payload.blocks[i].bg_image_base64; }
                        }
                    }
                }
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("Perubahan disimpan! Refresh website Anda.");
            } catch (err) { alert("Gagal menyimpan!"); }
            btn.innerText = "💾 Simpan Perubahan Web"; btn.disabled = false;
        });
    </script>
  </body></html>
